# Centralized person-identity backend for `registry-faces ingest-identity`.
# mode: "file" (dry-run to local files) or "hbase" (production). The CLI
# --to flag overrides this.
identity.mode=hbase

# file / dry-run mode: where person records, review queue, and blobs land.
file.root=./identity-store

# hbase mode (fill in once HBase + the Thrift gateway are running):
hbase.host=localhost
hbase.port=9090
hbase.table_prefix=

# image bytes (object store later) + review-queue locations.
blobs.dir=./identity-store/blobs
review.dir=./identity-store/review

# image bytes -> HDFS Avro containers (full-res, MapReduce-ready); pointers stay in HBase
blobs.backend=hdfs-avro
blobs.hdfs_base=/images
blobs.staging_root=C:/development/.image-staging
blobs.ssh_host=berserkr
